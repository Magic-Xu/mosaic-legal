<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosaic 法律文档</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0b;
      --card: #141414;
      --text: #f2f2f2;
      --sub: #b3b3b3;
      --line: #262626;
      --brand: #7c4dff;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 18px; color: var(--sub); }
    a {
      display: block;
      margin: 10px 0;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      background: #101010;
    }
    a:hover {
      border-color: var(--brand);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mosaic 法律文档</h1>
    <p>以下文档可直接用于应用设置页跳转与商店合规填写。</p>
    <a href="./privacy.html">隐私政策</a>
    <a href="./terms.html">服务条款</a>
  </main>
</body>
</html>
