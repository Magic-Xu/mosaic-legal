<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosaic Legal Documents</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0b;
      --card: #141414;
      --text: #f2f2f2;
      --sub: #b3b3b3;
      --line: #262626;
      --brand: #7c4dff;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 18px; color: var(--sub); line-height: 1.6; }
    .row { display: grid; gap: 10px; margin-bottom: 18px; }
    a {
      display: block;
      margin: 0;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      background: #101010;
    }
    a:hover { border-color: var(--brand); }
    .lang { margin-top: 10px; }
    .muted { color: var(--sub); font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mosaic Legal Documents</h1>
    <p>This page provides public legal links for in-app settings and app store compliance.</p>

    <div class="row">
      <a href="./privacy.html">Privacy Policy (EN)</a>
      <a href="./terms.html">Terms of Service (EN)</a>
    </div>

    <div class="row lang">
      <a href="./zh-CN/index.html">中文文档入口</a>
      <a href="./zh-CN/privacy.html">隐私政策（中文）</a>
      <a href="./zh-CN/terms.html">服务条款（中文）</a>
    </div>

    <p class="muted">Feedback: <a href="mailto:snapmosaic.help@outlook.com">snapmosaic.help@outlook.com</a> · <a href="https://github.com/Magic-Xu/mosaic-legal/issues">GitHub Issues</a></p>
  </main>
</body>
</html>
